# Netlify deployment config for Carma (carma.cat)
#
# Next.js 16 (App Router, SSR + Route Handlers) is served via the official
# Netlify Next.js runtime — NOT as a static SPA. Do NOT add a catch-all
# `/* -> /index.html` redirect: that would break SSR pages, the /render and
# /embed route handlers, and the /api endpoints. The plugin maps every route
# (static, server-rendered, and API) to the correct Netlify primitive.
#
# Required environment variables (set in the Netlify UI → Site settings → Env):
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   ANTHROPIC_API_KEY            (Theme Studio / Magic Wand / dashboard article gen)
#   THEME_LLM_MODEL              (optional, defaults to claude-opus-4-7)
#
# WhatsApp Agent (T2-T4) — server-only:
#   OPENAI_API_KEY               (Whisper transcription + the agent loop)
#   WA_AGENT_MODEL               (optional, defaults to gpt-4o)
#   WA_TRANSCRIBE_MODEL          (optional, defaults to whisper-1)
#   Provider = Kapso (kapso.ai), the Meta WhatsApp proxy for the prepaid-SIM number:
#   KAPSO_API_KEY                (X-API-Key — outbound send + inbound media download)
#   KAPSO_WEBHOOK_SECRET         (HMAC-SHA256 secret for the X-Webhook-Signature header)
#   KAPSO_PHONE_NUMBER_ID        (the WhatsApp number id; default sender when a job has none)
#   KAPSO_API_BASE               (optional, defaults to https://api.kapso.ai/meta/whatsapp)
#   KAPSO_GRAPH_VERSION          (optional, defaults to v24.0)
#   WA_WORKER_SECRET             (bearer the cron uses to call /api/whatsapp/worker)
#   WA_WORKER_INTERNAL_URL       (optional — overrides Netlify's $URL for the cron)
#   WA_REVIEW_BASE_URL           (optional, defaults to https://carma.cat — review-link origin)
#   CRON_SECRET                  (pre-shared key for the portable GET /api/whatsapp/cron driver)
#
# Job driver — pick ONE (both funnel into the lease-based worker, safe but don't double-pay):
#   A) Netlify Scheduled Function netlify/functions/agent-worker-cron.mts — runs every
#      minute and POSTs /api/whatsapp/worker (WA_WORKER_SECRET); schedule auto-detected.
#   B) Portable GET /api/whatsapp/cron secured by CRON_SECRET — for Vercel Cron or any
#      external pinger (cron-job.org / UptimeRobot / GitHub Action). Trigger once a minute:
#        Authorization: Bearer $CRON_SECRET   (Vercel Cron),  or  ?key=$CRON_SECRET

[build]
  command = "next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Keep dev-only telemetry off in CI builds.
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"
