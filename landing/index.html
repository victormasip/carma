<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carma — Un blog empoderat</title>
  <meta name="description" content="Enganxa una URL. Carma clona la identitat visual del teu lloc web i et lliura un blog amb editor d'estil Notion en 30 segons. Sense codi.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            carma: {
              50:  '#fdfaef', 100: '#fbf3d6', 200: '#f7e4ac', 300: '#f2d179',
              400: '#eeb849', 500: '#d4af37', 600: '#b58f27', 700: '#906d1c',
              800: '#78591a', 950: '#1c1405',
            },
            page: '#F9F8F6',
            ink:  '#171717',
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          boxShadow: {
            premium: '0 30px 70px -10px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.01)',
            gold:    '0 10px 30px -6px rgba(212, 175, 55, 0.35)',
            goldlg:  '0 24px 60px -12px rgba(212, 175, 55, 0.45)',
            card:    '0 18px 40px -18px rgba(0, 0, 0, 0.18)',

          borderRadius: {
            '4xl': '2rem',
            '5xl': '2.5rem',
          },
          keyframes: {
            'fade-up':   { '0%': { opacity:0, transform:'translateY(14px)' }, '100%': { opacity:1, transform:'translateY(0)' } },

            'shimmer':   { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
            'caret':     { '0%,49%': { opacity: 1 }, '50%,100%': { opacity: 0 } },
            'glow':      { '0%,100%': { opacity: 0.55 }, '50%': { opacity: 0.85 } },

  <style>
    html { scroll-behavior: smooth; }
    body { background: #F9F8F6; color: #171717; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    ::selection { background: #d4af37; color: #fff; }

    /* Signature gold gradient button */
    .btn-gold {
      background-image: linear-gradient(90deg, #b58f27 0%, #d4af37 50%, #b58f27 100%);
      background-size: 200% 100%;
      transition: background-position .4s ease, transform .15s ease, box-shadow .3s ease;
    }
    .btn-gold:hover { background-position: 100% 0; }
    .btn-gold:active { transform: scale(0.985); }

    /* Faux iridescent gold border on the Premium pricing card */
    .gold-ring {
      position: relative;
      background: #fff;
      border-radius: 2rem;
      isolation: isolate;
    }
    .gold-ring::before {
      content: ""; position: absolute; inset: -1.5px;
      background: linear-gradient(135deg, #f7e4ac 0%, #d4af37 35%, #fdfaef 55%, #b58f27 75%, #f2d179 100%);
      border-radius: inherit;
      z-index: -1;
    }

    /* Premium press feedback applied app-wide */
    button:not(:disabled):active { transform: scale(0.985); }

    /* Hero atmospheric gold halos */
    .halo {
      position: absolute;
      border-radius: 9999px;
      filter: blur(140px);
      pointer-events: none;
    }
    /* Slow drift on the hero halos for a "magical atmosphere" feel */
    @keyframes drift-a { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px,-30px) scale(1.06); } }
    @keyframes drift-b { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-50px,40px) scale(1.08); } }
    @keyframes drift-c { 0%,100% { transform: translate(-50%,0) scale(1); } 50% { transform: translate(calc(-50% + 30px),20px) scale(1.04); } }
    .halo-drift-a { animation: drift-a 18s ease-in-out infinite; }
    .halo-drift-b { animation: drift-b 22s ease-in-out infinite; }
    .halo-drift-c { animation: drift-c 20s ease-in-out infinite; }

    /* Section anchors: account for the floating nav */
    section[id] { scroll-margin-top: 110px; }

    /* Shimmering gold text — drifts indefinitely over a wide gradient */
    .shimmer-gold {
      background: linear-gradient(100deg, #906d1c 0%, #d4af37 25%, #f7e4ac 50%, #d4af37 75%, #906d1c 100%);
      background-size: 220% 100%;
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
      animation: shimmer-text 5.5s linear infinite;
    }
    @keyframes shimmer-text {
      0%   { background-position: 220% 0; }
      100% { background-position: -220% 0; }
    }

    /* Scroll-reveal: hidden by default, revealed when intersected */
    [data-reveal] {
      opacity: 0;
      transform: translateY(28px);
      transition:
        opacity 0.9s cubic-bezier(0.16,1,0.3,1),
        transform 0.9s cubic-bezier(0.16,1,0.3,1);
      transition-delay: var(--reveal-delay, 0ms);
    }
    [data-reveal].in-view { opacity: 1; transform: translateY(0); }
    @media (prefers-reduced-motion: reduce) {
      [data-reveal] { opacity: 1; transform: none; transition: none; }
      .halo-drift-a, .halo-drift-b, .halo-drift-c, .shimmer-gold { animation: none !important; }
    }

    /* Cursor-following soft spotlight inside the URL input */
    .pointer-spot {
      position: absolute; inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: radial-gradient(240px circle at var(--mx, 50%) var(--my, 50%),
                                   rgba(212,175,55,0.18), transparent 65%);
      opacity: 0; transition: opacity 0.4s ease;
    }
    .pointer-host:hover .pointer-spot,
    .pointer-host:focus-within .pointer-spot { opacity: 1; }

    /* Animated caret in the URL input */
    .caret::after {
      content: "";
      display: inline-block;
      width: 2px; height: 1.1em;
      background: #d4af37;
      margin-left: 4px;
      vertical-align: -0.18em;
      animation: caret 1.05s steps(1) infinite;
    }
    @keyframes caret { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }

    /* Soft top-of-card highlight */
    .top-highlight {
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 30px 70px -10px rgba(0,0,0,0.06);
    }

    /* Bento card hover lift */
    .bento {
      transition: transform .35s cubic-bezier(0.16,1,0.3,1), box-shadow .35s cubic-bezier(0.16,1,0.3,1);
    }
    .bento:hover { transform: translateY(-4px); box-shadow: 0 26px 56px -22px rgba(0,0,0,0.25); }

    /* Hero headline word stagger */
    .word { display: inline-block; opacity: 0; transform: translateY(28px); animation: fade-up 0.85s cubic-bezier(0.16,1,0.3,1) forwards; }
    @keyframes fade-up { 0% { opacity: 0; transform: translateY(28px); } 100% { opacity: 1; transform: translateY(0); } }

    /* Hide scrollbar on the toolbar mock */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { scrollbar-width: none; }

    /* Eyebrow chip used everywhere */
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(212,175,55,0.10);
      border: 1px solid rgba(212,175,55,0.30);
      color: #906d1c;
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .eyebrow .dot {
      width: 6px; height: 6px; border-radius: 999px;
      background: #d4af37;
      box-shadow: 0 0 8px rgba(212,175,55,0.8);
      animation: glow 2.5s ease-in-out infinite;
    }
  </style>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef } = React;

/* ───── Wordmark ───── */
function Wordmark({ size = "text-2xl", dark = false }) {
  return (
    <span className={`${size} font-extrabold tracking-[-0.04em] leading-none ${dark ? "text-white" : "text-ink"}`}>
      Carma<span className="text-carma-500">.</span>
    </span>
  );
}

/* ───── Top Nav ───── */
function Nav() {
  const [open, setOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 12);
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  // Lock body scroll while drawer is open
  useEffect(() => {
    if (!open) return;
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = prev; };
  }, [open]);

  const navLinks = [
    { href: '#com-funciona',    label: 'Com funciona'    },
    { href: '#editor',          label: "L'editor"         },
    { href: '#caracteristiques',label: 'Característiques' },
    { href: '#preus',           label: 'Preus'            },
  ];

  return (
    <>
      <header className="fixed top-0 inset-x-0 z-50">
        <div className="mx-auto max-w-7xl px-4 sm:px-8 pt-4 sm:pt-5">
          <div className={`flex items-center justify-between gap-3 rounded-full bg-white/85 backdrop-blur-xl border transition-all duration-300 px-3 sm:px-5 py-2 sm:py-2.5 ${
            scrolled
              ? 'border-neutral-200/80 shadow-[0_12px_36px_-16px_rgba(0,0,0,0.18)]'
              : 'border-neutral-200/40 shadow-[0_8px_30px_-12px_rgba(0,0,0,0.06)]'
          }`}>

              <Wordmark size="text-xl" />
            </a>
            <nav className="hidden lg:flex items-center gap-6 text-[13px] font-semibold text-neutral-600">

            <div className="flex items-center gap-1.5 sm:gap-2 shrink-0">

              <a href="#hero-input" className="btn-gold inline-flex items-center gap-1.5 text-white text-[12px] sm:text-[13px] font-bold pl-3.5 sm:pl-4 pr-2.5 sm:pr-3 py-2 rounded-full shadow-gold whitespace-nowrap">
                <span className="hidden sm:inline">Provar gratis</span>
                <span className="sm:hidden">Provar</span>
                <ArrowRight className="w-3.5 h-3.5" strokeWidth={2.5}/>
              </a>
              <button
                onClick={() => setOpen(!open)}
                aria-label={open ? 'Tancar menú' : 'Obrir menú'}
                aria-expanded={open}

                {open ? <X className="w-4 h-4"/> : <Menu className="w-4 h-4"/>}

            </div>
          </div>
        </div>
      </header>

      <div
        className={`lg:hidden fixed inset-0 z-40 transition-opacity duration-300 ${open ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}
        onClick={() => setOpen(false)}
      >
        <div className="absolute inset-0 bg-neutral-900/40 backdrop-blur-sm"/>
      </div>
      <aside
        className={`lg:hidden fixed top-0 right-0 z-50 h-full w-[84vw] max-w-[340px] bg-white shadow-[0_24px_60px_-12px_rgba(0,0,0,0.3)] transition-transform duration-300 ease-[cubic-bezier(0.16,1,0.3,1)] ${open ? 'translate-x-0' : 'translate-x-full'}`}

        <nav className="p-4 flex flex-col gap-0.5 text-[15px] font-bold">
          {navLinks.map(l => (
            <a

              href={l.href}
              onClick={() => setOpen(false)}
              className="flex items-center justify-between px-4 py-3.5 rounded-2xl hover:bg-neutral-50 text-neutral-700 transition-colors"

          </a>
        </div>
      </aside>
    </>
  );
}

Object.assign(window, { Wordmark, Nav });

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef } = React;

/* ───── The signature URL Input.
       Placeholder is animated — types and deletes through samples — so the
       real input value stays fully editable for the user. ───── */
function UrlInput({ value, onChange, onSubmit, id = "hero-input", ctaLabel = "Genera el meu blog", ctaLabelShort = "Generar" }) {
  const samples = ["la-teva-marca.cat", "restaurant-ferreteria.com", "atelierdejoieria.cat", "vinyetapetita.cat"];
  const [phase, setPhase] = React.useState({ i: 0, dir: 1, idx: 0 });
  const [focused, setFocused] = React.useState(false);
  const formRef = React.useRef(null);

  const handleMove = (e) => {
    const r = formRef.current?.getBoundingClientRect();
    if (!r) return;
    formRef.current.style.setProperty('--mx', `${e.clientX - r.left}px`);
    formRef.current.style.setProperty('--my', `${e.clientY - r.top}px`);
  };

  // Compute the visible placeholder for THIS render from phase state, so it
  // matches what was just animated (no off-by-one frame).
  const animatedPlaceholder = "https://" + samples[phase.i].slice(0, phase.idx);

  React.useEffect(() => {
    if (value || focused) return;
    const cur = samples[phase.i];
    const speed = phase.dir === 1 ? 65 : 28;
    const pause = phase.dir === 1 && phase.idx === cur.length ? 1500 : 0;
    const t = setTimeout(() => {
      setPhase((p) => {
        const c = samples[p.i];
        if (p.dir === 1 && p.idx < c.length) return { ...p, idx: p.idx + 1 };
        if (p.dir === 1 && p.idx === c.length) return { ...p, dir: -1 };
        if (p.dir === -1 && p.idx > 0) return { ...p, idx: p.idx - 1 };
        return { i: (p.i + 1) % samples.length, dir: 1, idx: 0 };
      });
    }, speed + pause);
    return () => clearTimeout(t);
  }, [phase, value, focused]);

  const handleSubmit = (e) => {
    e.preventDefault();
    onSubmit?.(value.trim() || "https://la-teva-web.cat");
  };

  return (
    <form
      ref={formRef}
      id={id}
      onSubmit={handleSubmit}
      onMouseMove={handleMove}
      className="pointer-host relative w-full max-w-2xl mx-auto"
    >
      {/* Outer halo */}
      <div className="absolute inset-0 -m-2 rounded-[2rem] bg-carma-300/30 blur-2xl pointer-events-none animate-glow"></div>
      <div className={`relative flex items-center bg-white rounded-[1.75rem] border ${focused ? "border-carma-400" : "border-neutral-200/80"} shadow-premium p-2 sm:p-2.5 gap-2 transition-colors overflow-hidden`}>
        <div className="pointer-spot rounded-[1.75rem]"></div>
        <div className="relative hidden sm:flex items-center gap-2 pl-3 pr-1 text-neutral-300">
          <Globe className="w-5 h-5"/>
          <div className="w-px h-6 bg-neutral-200"/>
        </div>
        <input
          type="text"
          value={value}
          onChange={(e) => onChange(e.target.value)}
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
          placeholder={animatedPlaceholder}
          spellCheck={false}
          autoComplete="off"
          autoCapitalize="off"
          className="relative flex-1 min-w-0 bg-transparent outline-none px-3 sm:px-1 py-3 text-base sm:text-lg font-medium text-ink placeholder:text-neutral-300"
        />
        <button
          type="submit"
          className="btn-gold relative shrink-0 inline-flex items-center gap-2 text-white font-bold text-sm sm:text-base px-4 sm:px-6 py-3 sm:py-3.5 rounded-2xl shadow-gold"
        >
          <Wand className="w-4 h-4 sm:w-5 sm:h-5" strokeWidth={2}/>
          <span className="hidden sm:inline">{ctaLabel}</span>
          <span className="sm:hidden">{ctaLabelShort}</span>
        </button>
      </div>
    </form>
  );
}

<script type="text/babel" data-presets="env,react">
function GenerateModal({ url, onClose }) {
  const [phase, setPhase] = React.useState('start'); // 'start' | 'progress' | 'ready'
  const [stage, setStage] = React.useState(0);

  const displayUrl = url.replace(/^https?:\/\//i, "");

  const steps = [
    { label: 'Connectant el teu compte',         detail: 'OAuth · només lectura' },
    { label: `Visitant ${displayUrl}`,           detail: 'Carregant la pàgina pública' },
    { label: 'Llegint capçalera i peu',          detail: '<header>, <nav>, <footer>' },
    { label: 'Extreient la paleta',              detail: '6 colors detectats' },
    { label: 'Detectant les tipografies',        detail: 'Serif + sans' },
    { label: 'Generant el tema',                 detail: 'Variables CSS · tokens' },
  ];

  React.useEffect(() => {
    if (phase !== 'progress') return;
    if (stage >= steps.length) {
      const t = setTimeout(() => setPhase('ready'), 700);
      return () => clearTimeout(t);
    }
    const t = setTimeout(() => setStage((s) => s + 1), 800);
    return () => clearTimeout(t);
  }, [stage, phase, steps.length]);

  // Lock body scroll
  React.useEffect(() => {
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = prev; };
  }, []);

  // Escape closes
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  const start = () => { setStage(0); setPhase('progress'); };

  return (
    <div
      className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-neutral-900/45 backdrop-blur-sm animate-fade-up"
      onClick={onClose}
      role="dialog"
      aria-modal="true"
    >
      <div
        className="relative w-full max-w-lg bg-white rounded-[2rem] shadow-premium overflow-hidden"
        onClick={(e) => e.stopPropagation()}
        style={{ animation: 'fade-up 0.4s cubic-bezier(0.16,1,0.3,1) both' }}
      >
        <button
          onClick={onClose}
          aria-label="Tancar"
          className="absolute top-5 right-5 z-10 w-9 h-9 rounded-full bg-neutral-50 hover:bg-neutral-100 text-neutral-400 hover:text-neutral-900 flex items-center justify-center transition-colors"
        >
          <X className="w-4 h-4"/>
        </button>

        {phase === 'start'    && <StartPanel    url={url} displayUrl={displayUrl} onContinue={start}/>}
        {phase === 'progress' && <ProgressPanel displayUrl={displayUrl} stage={stage} steps={steps}/>}
        {phase === 'ready'    && <ReadyPanel    displayUrl={displayUrl}/>}
      </div>
    </div>
  );
}

      >

        Continuar amb GitHub
      </button>
      <button
        onClick={onContinue}
        className="w-full flex items-center justify-center gap-2.5 px-5 py-4 rounded-2xl bg-white border border-neutral-200 text-ink text-sm font-extrabold tracking-tight hover:bg-neutral-50 hover:border-neutral-300 transition-colors"
      >
        Continuar amb el correu

      <p className="mt-6 text-[11px] text-center font-medium text-neutral-400 leading-relaxed">
        Només llegim les dades públiques de la teva web. <span className="text-neutral-500 font-semibold">Sense escriure res al teu codi.</span>
      </p>
    </div>
  );
}

function ProgressPanel({ displayUrl, stage, steps }) {
  return (
    <div className="p-9 pt-12 sm:p-11 sm:pt-12">
      <div className="flex items-center gap-3 mb-6">
        <div className="relative w-11 h-11 rounded-2xl bg-gradient-to-br from-carma-100 to-carma-50 border border-carma-200/60 flex items-center justify-center text-carma-700 shrink-0">
          <span className="absolute inset-0 rounded-2xl border-2 border-carma-400/70 border-r-transparent animate-rotate-slow"></span>
          <Wand className="w-4 h-4 relative" strokeWidth={2}/>
        </div>
        <div className="flex-1 min-w-0">
          <h3 className="text-base font-extrabold tracking-tight text-ink truncate">Clonant {displayUrl}</h3>
          <p className="text-xs font-medium text-neutral-400">Trigarà uns segons…</p>
        </div>
      </div>

      <div className="space-y-2">
        {steps.map((s, i) => {
          const done = i < stage;
          const active = i === stage;
          return (
            <div key={i}
              className={`flex items-center gap-3 px-3.5 py-2.5 rounded-xl border transition-all ${
                done ? 'bg-green-50/50 border-green-100' :
                active ? 'bg-carma-50/50 border-carma-200/70' :
                'bg-neutral-50/40 border-neutral-100 opacity-55'

              <div className={`w-6 h-6 rounded-full flex items-center justify-center shrink-0 transition-colors ${
                done ? 'bg-green-500 text-white' :
                active ? 'bg-white border-2 border-carma-400' :
                'bg-white border-2 border-neutral-200'

              </div>
              <div className="flex-1 min-w-0">
                <div className={`text-[12.5px] font-extrabold tracking-tight ${done ? 'text-green-800' : active ? 'text-ink' : 'text-neutral-500'}`}>{s.label}</div>
                <div className={`text-[10.5px] font-medium truncate ${done ? 'text-green-700/70' : 'text-neutral-400'}`}>{s.detail}</div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Detected assets preview — appears as the relevant steps complete */}
      {stage >= 4 && (
        <div className="mt-5 px-3.5 py-3 rounded-2xl bg-gradient-to-br from-carma-50 to-white border border-carma-200/60 animate-fade-up">
          <div className="text-[10px] font-extrabold uppercase tracking-[0.14em] text-carma-700 mb-2">Detectat al teu lloc</div>

            <span style={{fontFamily:'Georgia, serif'}}>Playfair Display</span>
            <span className="text-neutral-300">+</span>
            <span className="font-extrabold tracking-tight">Inter</span>
          </div>
        </div>
      )}
    </div>
  );
}

function ReadyPanel({ displayUrl }) {
  return (
    <div className="p-9 pt-12 sm:p-11 sm:pt-12 text-center">
      <div className="relative mx-auto w-16 h-16 rounded-3xl bg-gradient-to-br from-carma-100 to-white border border-carma-200/60 flex items-center justify-center text-carma-700 mb-6 shadow-gold">

      <p className="text-sm font-medium text-neutral-500 leading-relaxed max-w-sm mx-auto mb-7">
        Hem clonat la identitat de <span className="font-mono text-neutral-700">{displayUrl}</span> i hem creat un primer article d'exemple. Ara només queda escriure.
      </p>
      <a
        href="#"
        className="btn-gold inline-flex items-center justify-center gap-2 px-6 py-4 rounded-2xl text-white text-sm font-extrabold tracking-tight shadow-gold"
      >
        Entrar a l'espai de treball <ArrowRight className="w-4 h-4" strokeWidth={2.5}/>
      </a>
      <div className="mt-5 text-[11px] font-extrabold tracking-[0.16em] uppercase text-neutral-400">
        Gratis · Sense targeta · Cancel·la quan vulguis
      </div>

}

Object.assign(window, { GenerateModal, StartPanel, ProgressPanel, ReadyPanel });
</script>

<script type="text/babel" data-presets="env,react">
/* ───── App ───── */
function App() {
  const [generateUrl, setGenerateUrl] = useState(null); // null = closed, string = open
  const onGenerate = (raw) => {
    const url = (raw || "").trim() || "https://la-teva-web.cat";
    const withProto = /^https?:\/\//i.test(url) ? url : `https://${url}`;
    setGenerateUrl(withProto);
  };

  // Reveal-on-scroll for anything tagged [data-reveal]
  useEffect(() => {
    const els = document.querySelectorAll('[data-reveal]:not(.in-view)');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in-view');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -60px 0px' });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav/>
      <main>
        <Hero onGenerate={onGenerate}/>
        <HowItWorks/>
        <EditorPreview/>
        <ProductTour/>
        <Bento/>
        <Pricing/>
        <FinalCta onGenerate={onGenerate}/>
        <Footer/>
      </main>
      {generateUrl !== null && (
        <GenerateModal url={generateUrl} onClose={() => setGenerateUrl(null)} />
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
