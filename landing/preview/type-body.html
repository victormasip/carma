<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 26px 32px; font-family: var(--font-sans); }
  .specimen { display: flex; flex-direction: column; gap: 16px; max-width: 620px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); letter-spacing: 0.02em; min-width: 130px; }
  .body  { font-size: 14px; font-weight: 500; color: var(--fg-3); line-height: 1.6; }
  .strong { font-size: 14px; font-weight: 700; color: var(--fg-1); }
  .button-label { font-size: 13px; font-weight: 700; color: var(--fg-1); letter-spacing: 0.005em; }
  .eyebrow { font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-4); }
  .caption { font-size: 12px; font-weight: 500; color: var(--fg-4); }
</style>
</head>
<body>
<div class="specimen">
  <div class="row">
    <span class="meta">Eyebrow · 11/800/0.12em UC</span>
    <span class="eyebrow">Accés al panell de control premium</span>
  </div>
  <div class="row">
    <span class="meta">Strong · 14/700</span>
    <span class="strong">Entrar a l'espai de treball</span>
  </div>
  <div class="row">
    <span class="meta">Body · 14/500/1.6</span>
    <span class="body">Gestiona el contingut dels teus llocs web amb una experiència refinada i sense fricció.</span>
  </div>
  <div class="row">
    <span class="meta">Button · 13/700</span>
    <span class="button-label">Crear Lloc</span>
  </div>
  <div class="row">
    <span class="meta">Caption · 12/500</span>
    <span class="caption">Pàgina 1 de 12 · 142 articles</span>
  </div>
</div>
</body>
</html>
