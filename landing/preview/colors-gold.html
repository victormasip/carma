<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px 28px; font-family: var(--font-sans); }
  .scale { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
  .step { display: flex; flex-direction: column; gap: 6px; }
  .chip { aspect-ratio: 1.1; border-radius: 14px; border: 1px solid var(--border-1); box-shadow: 0 2px 6px -2px rgba(0,0,0,0.04); }
  .name { font-size: 11px; font-weight: 700; color: var(--fg-1); }
  .hex { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg-4); }
  .star { color: var(--carma-600); font-size: 10px; margin-left: 2px; }
</style>
</head>
<body>
<div class="scale">
  <div class="step"><div class="chip" style="background:#fdfaef"></div><div class="name">50</div><div class="hex">#fdfaef</div></div>
  <div class="step"><div class="chip" style="background:#fbf3d6"></div><div class="name">100</div><div class="hex">#fbf3d6</div></div>
  <div class="step"><div class="chip" style="background:#f7e4ac"></div><div class="name">200</div><div class="hex">#f7e4ac</div></div>
  <div class="step"><div class="chip" style="background:#f2d179"></div><div class="name">300</div><div class="hex">#f2d179</div></div>
  <div class="step"><div class="chip" style="background:#eeb849"></div><div class="name">400</div><div class="hex">#eeb849</div></div>
  <div class="step"><div class="chip" style="background:#d4af37"></div><div class="name">500<span class="star">★</span></div><div class="hex">#d4af37</div></div>
  <div class="step"><div class="chip" style="background:#b58f27"></div><div class="name">600</div><div class="hex">#b58f27</div></div>
  <div class="step"><div class="chip" style="background:#906d1c"></div><div class="name">700</div><div class="hex">#906d1c</div></div>
  <div class="step"><div class="chip" style="background:#78591a"></div><div class="name">800</div><div class="hex">#78591a</div></div>
  <div class="step"><div class="chip" style="background:#1c1405"></div><div class="name">950</div><div class="hex">#1c1405</div></div>
</div>
</body>
</html>
