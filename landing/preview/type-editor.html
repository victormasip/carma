<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 28px 32px; font-family: var(--font-sans); }
  .editor {
    background: #fff; border-radius: 18px; border: 1px solid var(--border-1);
    padding: 26px 32px; max-width: 640px;
    font-family: var(--font-editor); font-size: 17px; line-height: 1.8; color: #1c1917;
    letter-spacing: -0.003em;
  }
  .editor h1 { font-size: 2rem; font-weight: 800; margin: 0 0 0.5em; line-height: 1.18; letter-spacing: -0.02em; }
  .editor h2 { font-size: 1.5rem; font-weight: 750; margin: 1em 0 0.45em; line-height: 1.25; letter-spacing: -0.015em; }
  .editor p { margin: 0.6em 0; }
  .editor blockquote {
    border-left: 3px solid var(--carma-500);
    margin: 1.2em 0; padding: 0.15em 0 0.15em 1.25em;
    color: #57534e; font-style: italic; font-size: 1.1em;
  }
  .editor a { color: var(--carma-700); text-decoration: underline; text-underline-offset: 2px; }
  .editor code { background: #f5f5f4; border-radius: 4px; padding: 0.1em 0.35em; font-family: var(--font-mono); font-size: 0.85em; }
</style>
</head>
<body>
<div class="editor">
  <h1>L'art de l'editor distret</h1>
  <p>El cos de l'editor és <strong>17px</strong> a línia 1.8, amb tracking lleugerament negatiu. Els <a href="#">enllaços</a> són daurats i el codi <code>inline</code> viu en una caixeta pedra.</p>
  <blockquote>«Bones cites mereixen una vora daurada de 3px.»</blockquote>
</div>
</body>
</html>
