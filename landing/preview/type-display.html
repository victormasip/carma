<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 26px 32px; font-family: var(--font-sans); }
  .specimen { display: flex; flex-direction: column; gap: 14px; }
  .specimen-row { display: flex; align-items: baseline; gap: 16px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); letter-spacing: 0.02em; min-width: 130px; }
  .wordmark { font-size: 56px; font-weight: 800; letter-spacing: -1.4px; color: var(--fg-1); line-height: 1; }
  .wordmark .dot { color: var(--carma-500); }
  .h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; color: var(--fg-1); line-height: 1.1; }
  .h2 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; color: var(--fg-1); line-height: 1.15; }
  .h3 { font-size: 20px; font-weight: 700; letter-spacing: -0.015em; color: var(--fg-1); }
</style>
</head>
<body>
<div class="specimen">
  <div class="specimen-row">
    <span class="meta">Wordmark · 56/800/-1.4</span>
    <span class="wordmark">Carma<span class="dot">.</span></span>
  </div>
  <div class="specimen-row">
    <span class="meta">H1 · 32/800/-0.02em</span>
    <span class="h1">Els meus Llocs</span>
  </div>
  <div class="specimen-row">
    <span class="meta">H2 · 24/800/-0.02em</span>
    <span class="h2">Crear un nou Lloc</span>
  </div>
  <div class="specimen-row">
    <span class="meta">H3 · 20/700/-0.015em</span>
    <span class="h3">Blog de Viatges Acme</span>
  </div>
</div>
</body>
</html>
