<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px 28px; font-family: var(--font-sans); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 8px; }
  .step { display: flex; flex-direction: column; gap: 6px; }
  .chip { aspect-ratio: 1.1; border-radius: 14px; border: 1px solid var(--border-1); }
  .name { font-size: 11px; font-weight: 700; color: var(--fg-1); }
  .hex { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg-4); }
</style>
</head>
<body>
<div class="scale">
  <div class="step"><div class="chip" style="background:#fafafa"></div><div class="name">50</div><div class="hex">#fafafa</div></div>
  <div class="step"><div class="chip" style="background:#f5f5f5"></div><div class="name">100</div><div class="hex">#f5f5f5</div></div>
  <div class="step"><div class="chip" style="background:#e5e5e5"></div><div class="name">200</div><div class="hex">#e5e5e5</div></div>
  <div class="step"><div class="chip" style="background:#d4d4d4"></div><div class="name">300</div><div class="hex">#d4d4d4</div></div>
  <div class="step"><div class="chip" style="background:#a3a3a3"></div><div class="name">400</div><div class="hex">#a3a3a3</div></div>
  <div class="step"><div class="chip" style="background:#737373"></div><div class="name">500</div><div class="hex">#737373</div></div>
  <div class="step"><div class="chip" style="background:#525252"></div><div class="name">600</div><div class="hex">#525252</div></div>
  <div class="step"><div class="chip" style="background:#404040"></div><div class="name">700</div><div class="hex">#404040</div></div>
  <div class="step"><div class="chip" style="background:#262626"></div><div class="name">800</div><div class="hex">#262626</div></div>
  <div class="step"><div class="chip" style="background:#171717"></div><div class="name">900</div><div class="hex">#171717</div></div>
  <div class="step"><div class="chip" style="background:#0a0a0a"></div><div class="name">950</div><div class="hex">#0a0a0a</div></div>
</div>
</body>
</html>
