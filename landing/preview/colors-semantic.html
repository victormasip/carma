<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 26px 32px; font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .group { display: flex; flex-direction: column; gap: 8px; }
  .chip-row { display: flex; gap: 6px; }
  .chip { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border-1); }
  .title { font-size: 12px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-1); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; align-self: flex-start; }
  .dot { width: 6px; height: 6px; border-radius: 999px; }
</style>
</head>
<body>
<div class="row">
  <div class="group">
    <span class="pill" style="background:#dcfce7;color:#15803d"><span class="dot" style="background:#22c55e"></span>Success</span>
    <div class="chip-row">
      <div class="chip" style="background:#f0fdf4" title="success-50"></div>
      <div class="chip" style="background:#dcfce7" title="success-100"></div>
      <div class="chip" style="background:#22c55e" title="success-500"></div>
      <div class="chip" style="background:#15803d" title="success-700"></div>
    </div>
    <span class="hex">22c55e · 15803d</span>
  </div>
  <div class="group">
    <span class="pill" style="background:#fee2e2;color:#b91c1c"><span class="dot" style="background:#ef4444"></span>Danger</span>
    <div class="chip-row">
      <div class="chip" style="background:#fef2f2"></div>
      <div class="chip" style="background:#fee2e2"></div>
      <div class="chip" style="background:#ef4444"></div>
      <div class="chip" style="background:#b91c1c"></div>
    </div>
    <span class="hex">ef4444 · b91c1c</span>
  </div>
  <div class="group">
    <span class="pill" style="background:#dbeafe;color:#1e3a8a"><span class="dot" style="background:#3b82f6"></span>Info</span>
    <div class="chip-row">
      <div class="chip" style="background:#eff6ff"></div>
      <div class="chip" style="background:#dbeafe"></div>
      <div class="chip" style="background:#3b82f6"></div>
      <div class="chip" style="background:#1e3a8a"></div>
    </div>
    <span class="hex">3b82f6 · 1e3a8a</span>
  </div>
  <div class="group">
    <span class="pill" style="background:#fef3c7;color:#92400e"><span class="dot" style="background:#f59e0b"></span>Warning</span>
    <div class="chip-row">
      <div class="chip" style="background:#fffbeb"></div>
      <div class="chip" style="background:#fef3c7"></div>
      <div class="chip" style="background:#f59e0b"></div>
      <div class="chip" style="background:#92400e"></div>
    </div>
    <span class="hex">f59e0b · 92400e</span>
  </div>
</div>
</body>
</html>
